<!DOCTYPE html>
<html>
<head>
  <title>HR Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    button {
      margin-top: 10px;
      padding: 5px 10px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<h2>HR Dashboard</h2>

<div id="list"></div>

<script>

const DATA_URL = "https://raw.githubusercontent.com/narongdetnan-dev/job-status/main/applications.json";

/* 👉 ใส่ URL จาก Power Automate */
const API_URL = "PUT_YOUR_FLOW_URL_HERE";

async function load(){

  let res = await fetch(DATA_URL);
  let data = await res.json();

  let html = "";

  data.forEach((item) => {

    html += `
      <div class="card">
        <b>${item.FullName}</b><br>
        ${item.Position}<br><br>

        <select id="status-${item.IDCard}">
          <option ${item.Status==="Applied"?"selected":""}>Applied</option>
          <option ${item.Status==="Screening"?"selected":""}>Screening</option>
          <option ${item.Status==="Interview"?"selected":""}>Interview</option>
          <option ${item.Status==="Offer"?"selected":""}>Offer</option>
          <option ${item.Status==="Hired"?"selected":""}>Hired</option>
        </select>

        <br>

        <button onclick="update('${item.IDCard}')">Update</button>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

async function update(id){

  const token = "YOUR_GITHUB_TOKEN";  // 🔥 ใส่ token ตรงนี้
  const owner = "narongdetnan-dev";
  const repo = "job-status";
  const path = "applications.json";

  let status = document.getElementById("status-" + id).value;

  // ✅ 1. โหลด JSON ปัจจุบัน
  let res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`);
  let data = await res.json();

  let content = JSON.parse(atob(data.content));

  // ✅ 2. update status
  content.forEach(item => {
    if(item.IDCard === id){
      item.Status = status;
    }
  });

  // ✅ 3. encode ใหม่
  let updatedContent = btoa(JSON.stringify(content, null, 2));

  // ✅ 4. push กลับ GitHub
  await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
    method: "PUT",
    headers: {
      "Authorization": "Bearer " + token,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: "Update status via admin",
      content: updatedContent,
      sha: data.sha
    })
  });

  alert("✅ Updated จริงแล้ว!");
}

  
load();
  



</script>
