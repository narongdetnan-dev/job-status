<!DOCTYPE html>
<html>
<head>
  <title>Application Status</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial;
      background: #f5f7fb;
    }

    .header {
      background: #1e293b;
      color: white;
      padding: 15px 20px;
      font-size: 18px;
      font-weight: bold;
    }

    .container {
      max-width: 420px;
      margin: 50px auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h2 {
      margin-bottom: 20px;
      color: #333;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
    }

    button:hover {
      background: #1d4ed8;
    }

    #result {
      margin-top: 20px;
    }

    .result-card {
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #eee;
      margin-top: 10px;
    }

    .badge {
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      display: inline-block;
      margin-top: 5px;
    }

    .applied {
      background: #e0f2fe;
      color: #0369a1;
    }

    .interview {
      background: #fef3c7;
      color: #92400e;
    }

    .offer {
      background: #dcfce7;
      color: #166534;
    }

    .error {
      color: red;
      font-size: 14px;
    }

    .loading {
      color: #555;
    }

    .label {
      font-size: 13px;
      color: #777;
    }

  </style>
</head>

<body>

<div class="header">
  Company Recruitment Portal
</div>

<div class="container">
  <div class="card">

    <h2>Check Application Status</h2>

    <input id="idcard" placeholder="Enter ID Card Number">
    <button onclick="check()">Check Status</button>

    <div id="result"></div>

  </div>
</div>

<script>

function getStatusClass(status){
  if(status === "Applied") return "applied";
  if(status === "Interview") return "interview";
  if(status === "Offer") return "offer";
  return "applied";
}

async function check() {
  let id = document.getElementById("idcard").value;
  let result = document.getElementById("result");

  if (!id) {
    result.innerHTML = "<div class='error'>Please enter ID Card</div>";
    return;
  }

  result.innerHTML = "<div class='loading'>Checking...</div>";

  try {
    let res = await fetch("https://raw.githubusercontent.com/narongdetnan-dev/job-status/main/applications.json");
    let data = await res.json();

    let found = data.find(x => x.IDCard === id);

    if (found) {

      let statusClass = getStatusClass(found.Status);

      result.innerHTML = `
        <div class="result-card">
          <div class="label">Name</div>
          <div><b>${found.FullName}</b></div>

          <div class="label">Position</div>
          <div>${found.Position}</div>

          <div class="label">Status</div>
          <div class="badge ${statusClass}">${found.Status}</div>
        </div>
      `;
    } else {
      result.innerHTML = "<div class='error'>❌ ID Card not found</div>";
    }

  } catch (err) {
    result.innerHTML = "<div class='error'>⚠️ Error loading data</div>";
  }
}

</script>

</body>
</html>
